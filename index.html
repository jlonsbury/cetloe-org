<style>
*{box-sizing:border-box} html,body{height:100%} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;background:linear-gradient(135deg,#00277a,#0039A6 60%,#1f5bd1);display:flex;align-items:center;justify-content:center;padding:20px}
.lk-card{background:#fff;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.3);padding:34px 30px;width:380px;max-width:100%;text-align:center;border-top:4px solid #C8102E}

.lk-card form{display:flex;gap:8px}
.lk-card input{flex:1;border:1px solid #e3e8f1;border-radius:9px;padding:11px 12px;font-size:14px;outline:0}
.lk-card input:focus{border-color:#1f5bd1;box-shadow:0 0 0 3px rgba(37,99,235,.15)}
.lk-card button{border:0;background:#0039A6;color:#fff;border-radius:9px;padding:11px 16px;font-size:14px;font-weight:700;cursor:pointer}
.lk-card button:hover{background:#00277a} .lk-card button:disabled{opacity:.6;cursor:default}
.lk-err{color:#b91c1c;font-size:12.5px;font-weight:600;min-height:16px;margin-top:10px}
.lk-foot{font-size:11px;color:#9aa6bd;margin-top:16px}
